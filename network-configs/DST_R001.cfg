! ==========================================================
! Device: DST_R001 (R2 - Internal Distribution / Core)
! Role: Inter-VLAN Routing, HSRP Gateway (Grp 1 Active), NAT, AAA RADIUS
! ==========================================================

hostname DST_R001
ip domain name lab.local

! --- Security & AAA ---
enable secret 5 <HIDDEN_HASH>
username admin privilege 15 secret 5 <HIDDEN_HASH>

aaa new-model
aaa authentication login DAILY-METHOD group radius local
aaa authentication login EMERGENCY-METHOD local
aaa session-id common

! --- Global Timestamps & NTP ---
service timestamps debug datetime msec localtime show-timezone
service timestamps log datetime msec localtime show-timezone
ntp server 10.10.10.1

! --- Object Tracking ---
! Tracks the external WAN link to trigger HSRP failover if it drops
track 1 interface Ethernet0/0 line-protocol

! --- Interfaces (WAN & Loopback) ---
interface Loopback0
 ip address 10.10.10.2 255.255.255.255

interface Ethernet0/0
 description External BGP Link
 ip address 31.171.111.18 255.255.255.252
 ip nat outside
 ip virtual-reassembly in
 duplex auto

! --- Subinterfaces (Router-on-a-Stick & HSRP) ---
interface Ethernet0/1.10
 encapsulation dot1Q 10
 ip address 192.168.1.2 255.255.255.0
 ip nat inside
 ip virtual-reassembly in
 standby 1 ip 192.168.1.1
 standby 1 priority 110
 standby 1 preempt
 standby 1 track 1 decrement 20

interface Ethernet0/1.20
 encapsulation dot1Q 20
 ip address 192.168.2.2 255.255.255.0
 ip nat inside
 ip virtual-reassembly in
 standby 2 ip 192.168.2.1
 standby 2 priority 90
 standby 2 preempt

interface Ethernet0/1.55
 encapsulation dot1Q 55
 ip address 192.168.55.2 255.255.255.0
 standby 55 ip 192.168.55.1
 standby 55 preempt

interface Ethernet0/1.99
 encapsulation dot1Q 99
 ip address 192.168.99.2 255.255.255.0
 standby 99 ip 192.168.99.1
 standby 99 priority 110
 standby 99 preempt
 standby 99 track 1 decrement 20

! --- Routing (iBGP) ---
router bgp 65001
 bgp log-neighbor-changes
 neighbor 31.171.111.17 remote-as 100

! --- NAT / PAT Configuration ---
ip nat inside source list 10 interface Ethernet0/0 overload
access-list 10 permit 192.168.1.0 0.0.0.255
access-list 10 permit 192.168.2.0 0.0.0.255

! --- RADIUS Server Configuration ---
ip radius source-interface Loopback0
radius server WINDOWS-NPS
 address ipv4 192.168.55.10 auth-port 1812 acct-port 1813
 key MySuperSecretRadiusKey

! --- Console & VTY Management ---
line con 0
 logging synchronous
line vty 0 2
 description Primary Management Lines
 login authentication DAILY-METHOD
 transport input ssh
line vty 3 4
 description Out-of-Band / Emergency Access
 login authentication EMERGENCY-METHOD
 transport input ssh